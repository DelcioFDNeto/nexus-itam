<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Nexus ITAM — Plataforma SaaS de Gestão de Ativos de TI. Controle patrimônio, licenças, auditorias e muito mais." />
    <meta name="theme-color" content="#0a0a0c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>Nexus ITAM — Gestão Inteligente de Ativos</title>

    <!-- Favicon otimizado -->
    <link rel="icon" type="image/webp" href="/logo.webp" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />

    <!-- Preconnect para Firebase (reduz latência de autenticação) -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />

    <!-- Cache buster automático para PWA e Service Workers -->
    <script>
      (function() {
        const CURRENT_VERSION = '2.0.1';
        if (localStorage.getItem('NEXUS_VERSION') !== CURRENT_VERSION) {
          localStorage.setItem('NEXUS_VERSION', CURRENT_VERSION);
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              for (let registration of registrations) {
                registration.unregister();
              }
              if ('caches' in window) {
                caches.keys().then(function(names) {
                  return Promise.all(names.map(name => caches.delete(name)));
                }).then(function() {
                  window.location.reload(true);
                });
              } else {
                window.location.reload(true);
              }
            }).catch(function() {
              window.location.reload(true);
            });
          } else {
            window.location.reload(true);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
